<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>3D Plane Simulator — Real Model!</title>
<style>
  body { margin: 0; overflow: hidden; background: #87CEEB; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: monospace;
    background: rgba(0,0,0,0.3);
    padding: 8px;
    border-radius: 5px;
  }
</style>
</head>
<body>
<div id="hud">Speed: 0 | Altitude: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer;
let planeModel, planeVelocity = 0;
let planePitch = 0, planeRoll = 0;
let keys = {};
let clock = new THREE.Clock();

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  // Camera
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const direct = new THREE.DirectionalLight(0xffffff, 0.6);
  direct.position.set(5,10,7);
  scene.add(direct);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(500, 500, 10, 10);
  const groundMat = new THREE.MeshStandardMaterial({color: 0x228B22});
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // Load real airplane model
  const loader = new THREE.GLTFLoader();
  const modelURL = 'https://cdn.filer.dev/3d-model/2243156-airplane-n.glb'; // free plane model :contentReference[oaicite:1]{index=1}
  loader.load(modelURL, (gltf) => {
    planeModel = gltf.scene;
    planeModel.scale.set(1.5,1.5,1.5);
    scene.add(planeModel);
  });

  // Controls
  window.addEventListener('keydown', (e) => keys[e.code] = true);
  window.addEventListener('keyup', (e) => keys[e.code] = false);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  handleControls(delta);
  updateCamera();
  updateHUD();

  renderer.render(scene, camera);
}

function handleControls(delta) {
  if (!planeModel) return;

  const throttleSpeed = 20;
  const pitchSpeed = Math.PI;
  const rollSpeed = Math.PI;

  if(keys['KeyW']) planeVelocity += throttleSpeed * delta;
  if(keys['KeyS']) planeVelocity -= throttleSpeed * delta;
  planeVelocity = Math.max(0, planeVelocity);

  if(keys['ArrowUp']) planePitch += pitchSpeed * delta;
  if(keys['ArrowDown']) planePitch -= pitchSpeed * delta;
  if(keys['KeyA']) planeRoll += rollSpeed * delta;
  if(keys['KeyD']) planeRoll -= rollSpeed * delta;

  planeModel.rotation.z = planeRoll;
  planeModel.rotation.x = planePitch;

  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(planeModel.quaternion);
  planeModel.position.addScaledVector(dir, planeVelocity * delta);
}

function updateCamera() {
  if (!planeModel) return;

  const offset = new THREE.Vector3(0,1,3).applyQuaternion(planeModel.quaternion);
  camera.position.copy(planeModel.position).add(offset);
  const lookAt = new THREE.Vector3(0,0,-10).applyQuaternion(planeModel.quaternion).add(planeModel.position);
  camera.lookAt(lookAt);
}

function updateHUD() {
  const hud = document.getElementById('hud');
  hud.innerText = `Speed: ${planeVelocity.toFixed(1)} | Altitude: ${planeModel ? planeModel.position.y.toFixed(1) : 0}`;
}
</script>
</body>
</html>
