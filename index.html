<!DOCTYPE html>
<html>
<head>
<title>Iron Crown</title>
<style>
body {
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
}
#log {
    width:260px;
    height:100%;
    overflow-y:auto;
    background:#111;
    padding:10px;
    box-sizing:border-box;
}
#main {
    flex-grow:1;
    display:flex;
    flex-direction:column;
}
#map {
    flex-grow:1;
    position:relative;
    background:#2e3b2e;
    margin:5px;
    overflow:hidden;
}
#turn-info {
    padding:5px;
}

.kingdom {
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:12px;
    text-align:center;
    border:2px solid black;
}

.player { background:gold; color:black; }
.enemy { background:crimson; }
.ally { background:royalblue; }

.action-btns {
    position:absolute;
    display:flex;
    gap:5px;
    top:-45px;
    left:0;
}
.action-btns button {
    padding:4px 6px;
    font-size:10px;
}

.arrow {
    position:absolute;
    height:3px;
    background:white;
    transform-origin:0 0;
}

.spyArrow {
    background:gray;
}
</style>
</head>
<body>

<div id="log">
    <h2>👑 Iron Crown</h2>
    <h3>Battle Log</h3>
</div>

<div id="main">
    <div>
        <button onclick="resetGame()">Reset</button>
        <span id="turn-info"></span>
    </div>
    <div id="map"></div>
</div>

<script>
let kingdoms = [];
let selectedKingdoms = [];
let turn = 1;
let attacksThisTurn = 0;
let spiesThisTurn = 0;

const map = document.getElementById("map");
const log = document.getElementById("log");
const turnInfo = document.getElementById("turn-info");

function addLog(text){
    log.innerHTML += text + "<br>";
    log.scrollTop = log.scrollHeight;
}

function updateTurnInfo(){
    let allyCount = kingdoms.filter(k=>k.owner==="ally").length;
    turnInfo.innerText =
        "Turn: "+turn+
        " | Attacks: "+attacksThisTurn+"/2"+
        " | Spies: "+spiesThisTurn+"/1"+
        " | Allies: "+allyCount+"/2";
}

/* SAFE SPAWN */
function generateMap(){
    kingdoms = [];
    const minDistance = 12;

    for(let i=0;i<12;i++){
        let x,y,valid;
        do{
            valid=true;
            x=Math.random()*80;
            y=Math.random()*80;
            for(let k of kingdoms){
                let dx=k.x-x;
                let dy=k.y-y;
                if(Math.sqrt(dx*dx+dy*dy)<minDistance){
                    valid=false;
                    break;
                }
            }
        }while(!valid);

        kingdoms.push({
            id:i,
            x:x,
            y:y,
            troops:30+Math.floor(Math.random()*20),
            owner:i===0?"player":"enemy"
        });
    }
}

/* DRAW MAP */
function drawMap(){
    map.innerHTML="";
    kingdoms.forEach(k=>{
        const div=document.createElement("div");
        div.className="kingdom "+k.owner;
        div.style.left=k.x+"%";
        div.style.top=k.y+"%";
        div.innerHTML="🏰<br>"+k.troops;

        if(selectedKingdoms.includes(k)){
            div.style.boxShadow="0 0 15px 4px yellow";
        }

        div.onclick=()=>handleClick(k,div);
        map.appendChild(div);
    });
}

/* CLICK */
function handleClick(k,div){

    if(k.owner==="player" || k.owner==="ally"){
        if(selectedKingdoms.includes(k)){
            selectedKingdoms = selectedKingdoms.filter(x=>x!==k);
            addLog("Deselected kingdom with "+k.troops+" troops.");
        } else {
            selectedKingdoms.push(k);
            addLog("Selected kingdom with "+k.troops+" troops.");
        }
        drawMap();
        return;
    }

    if(selectedKingdoms.length===0) return;

    const box=document.createElement("div");
    box.className="action-btns";

    const attackBtn=document.createElement("button");
    attackBtn.innerText="Attack";
    attackBtn.onclick=(e)=>{e.stopPropagation();playerAttack(selectedKingdoms,k);};
    box.appendChild(attackBtn);

    const spyBtn=document.createElement("button");
    spyBtn.innerText="Spy";
    spyBtn.onclick=(e)=>{e.stopPropagation();sendSpy(selectedKingdoms[0],k);};
    box.appendChild(spyBtn);

    let allyCount=kingdoms.filter(x=>x.owner==="ally").length;
    if(allyCount<2){
        const allyBtn=document.createElement("button");
        allyBtn.innerText="Alliance";
        allyBtn.onclick=(e)=>{e.stopPropagation();requestAlliance(k);};
        box.appendChild(allyBtn);
    }

    div.appendChild(box);
}

/* DRAW ARROW */
function drawArrow(from,to,type="attack"){
    const arrow=document.createElement("div");
    arrow.className="arrow";
    if(type==="spy") arrow.classList.add("spyArrow");

    let dx=to.x-from.x;
    let dy=to.y-from.y;
    let length=Math.sqrt(dx*dx+dy*dy);
    let angle=Math.atan2(dy,dx)*(180/Math.PI);

    arrow.style.width=length+"%";
    arrow.style.left=from.x+"%";
    arrow.style.top=from.y+"%";
    arrow.style.transform="rotate("+angle+"deg)";

    map.appendChild(arrow);
    setTimeout(()=>arrow.remove(),500);
}

/* PLAYER ATTACK */
function playerAttack(attackers,defender){

    attacksThisTurn++;
    drawArrow(attackers[0],defender);

    let attackPower=attackers.reduce((s,a)=>s+a.troops*(Math.random()*0.4+0.8),0);
    let defendPower=defender.troops*(Math.random()*0.5+0.8);

    if(attackPower>defendPower){
        defender.owner="player";
        defender.troops=Math.floor(attackPower*0.5);
        addLog("✅ You conquered a kingdom!");
    } else {
        addLog("❌ You lost the battle!");
    }

    selectedKingdoms=[];
    drawMap();
    checkWin();

    if(attacksThisTurn>=2) endTurn();
    else aiTurn();

    updateTurnInfo();
}

/* SPY */
function sendSpy(from,target){
    if(spiesThisTurn>=1){
        addLog("⚠ Only 1 spy per turn!");
        return;
    }

    spiesThisTurn++;
    drawArrow(from,target,"spy");

    if(Math.random()<0.6){
        addLog("🕵️ Spy success! Enemy has "+target.troops+" troops.");
        if(Math.random()<0.3){
            target.troops=Math.max(5,target.troops-10);
            addLog("💣 Sabotage successful!");
        }
    } else {
        target.troops+=5;
        addLog("💀 Spy caught! Enemy strengthened.");
    }

    drawMap();
    updateTurnInfo();
}

/* ALLIANCE */
function requestAlliance(k){
    let allyCount=kingdoms.filter(x=>x.owner==="ally").length;
    if(allyCount>=2){
        addLog("⚠ Max 2 allies at a time!");
        return;
    }

    if(Math.random()<0.4){
        k.owner="ally";
        addLog("🤝 Alliance formed!");
    } else {
        addLog("❌ Alliance rejected.");
    }

    drawMap();
    updateTurnInfo();
}

/* AI TURN */
function aiTurn(){
    let enemies=kingdoms.filter(k=>k.owner==="enemy");
    if(enemies.length===0) return;

    let attacker=enemies[Math.floor(Math.random()*enemies.length)];
    let targets=kingdoms.filter(k=>k!==attacker);
    if(targets.length===0) return;

    let target=targets[Math.floor(Math.random()*targets.length)];
    drawArrow(attacker,target);

    let attackPower=attacker.troops*(Math.random()*0.4+0.8);
    let defendPower=target.troops*(Math.random()*0.5+0.8);

    if(attackPower>defendPower){
        attacker.troops=Math.floor(attacker.troops*0.6);
        target.owner="enemy";
        target.troops=Math.floor(attackPower*0.6);
        addLog("💀 AI conquered a kingdom!");
    }

    drawMap();
    checkWin();
}

/* END TURN */
function endTurn(){
    turn++;
    attacksThisTurn=0;
    spiesThisTurn=0;
    aiTurn();
    updateTurnInfo();
}

/* WIN */
function checkWin(){
    let playerSide=kingdoms.filter(k=>k.owner==="player"||k.owner==="ally");
    let enemies=kingdoms.filter(k=>k.owner==="enemy");

    if(enemies.length===0) alert("🏆 You conquered the world!");
    if(playerSide.length===0) alert("💀 You have fallen!");
}

/* RESET */
function resetGame(){
    turn=1;
    attacksThisTurn=0;
    spiesThisTurn=0;
    selectedKingdoms=[];
    log.innerHTML="<h2>👑 Iron Crown</h2><h3>Battle Log</h3>";
    generateMap();
    drawMap();
    updateTurnInfo();
}

generateMap();
drawMap();
updateTurnInfo();
</script>

</body>
</html>
