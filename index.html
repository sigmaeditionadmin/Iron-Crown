<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern Warfare – Global Conflict</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1b1f24;
    color: white;
    overflow: hidden;
}

#topBar {
    background: #111;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    border-bottom: 2px solid #333;
}

#gameContainer {
    display: flex;
    height: calc(100vh - 50px);
}

#mapContainer {
    flex: 3;
    overflow: hidden;
    position: relative;
    background: #0f141a;
}

#map {
    transform-origin: 0 0;
    transition: transform 0.2s;
    cursor: grab;
}

.country {
    stroke: #000;
    stroke-width: 1;
    cursor: pointer;
}

.player { fill: #2ecc71; }
.ai { fill: #e74c3c; }
.neutral { fill: #7f8c8d; }

#sidePanel {
    flex: 1;
    background: #111;
    padding: 10px;
    border-left: 2px solid #333;
    overflow-y: auto;
}

button {
    padding: 6px 10px;
    margin: 4px 0;
    background: #2c3e50;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #34495e;
}

#log {
    background: black;
    padding: 5px;
    height: 200px;
    overflow-y: auto;
    font-size: 12px;
}
</style>
</head>
<body>

<div id="topBar">
    <div>🌍 Modern Warfare – Global Conflict</div>
    <div>Oil: <span id="oil">100</span></div>
</div>

<div id="gameContainer">

<div id="mapContainer">
<svg id="map" width="2000" height="1000">

<!-- Simplified world-style regions -->
<rect id="usa" class="country player" x="200" y="300" width="200" height="120"/>
<rect id="russia" class="country ai" x="900" y="200" width="300" height="120"/>
<rect id="china" class="country ai" x="1050" y="350" width="200" height="120"/>
<rect id="iran" class="country ai" x="950" y="400" width="120" height="100"/>
<rect id="nk" class="country ai" x="1250" y="330" width="80" height="80"/>

</svg>
</div>

<div id="sidePanel">
    <h3 id="selectedName">Select Country</h3>
    <div id="stats"></div>
    <button onclick="attack()">Attack</button>
    <button onclick="retreat()">Retreat</button>
    <h3>Battle Log</h3>
    <div id="log"></div>
</div>

</div>

<script>
let oil = 100;
let zoom = 1;
let selected = null;

let countries = {
    usa: { owner: "player", infantry: 50, tanks: 10 },
    russia: { owner: "ai", infantry: 40, tanks: 8 },
    china: { owner: "ai", infantry: 45, tanks: 7 },
    iran: { owner: "ai", infantry: 25, tanks: 4 },
    nk: { owner: "ai", infantry: 20, tanks: 3 }
};

function updateUI() {
    document.getElementById("oil").innerText = oil;
}

function log(msg) {
    let logBox = document.getElementById("log");
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
}

function selectCountry(id) {
    selected = id;
    let c = countries[id];
    document.getElementById("selectedName").innerText = id.toUpperCase();
    document.getElementById("stats").innerHTML =
        "Owner: " + c.owner +
        "<br>Infantry: " + c.infantry +
        "<br>Tanks: " + c.tanks;
}

function attack() {
    if (!selected) return;

    let defender = countries[selected];
    let attacker = countries["usa"];

    if (defender.owner === "player") return;

    let attackPower = attacker.infantry + (attacker.tanks * 3) + Math.random()*20;
    let defendPower = defender.infantry + (defender.tanks * 3) + Math.random()*20;

    if (attackPower > defendPower) {
        log("USA captured " + selected.toUpperCase());
        defender.owner = "player";
        defender.infantry = Math.floor(attacker.infantry / 2);
        defender.tanks = Math.floor(attacker.tanks / 2);
        attacker.infantry = Math.floor(attacker.infantry / 2);
        attacker.tanks = Math.floor(attacker.tanks / 2);
        document.getElementById(selected).classList.remove("ai");
        document.getElementById(selected).classList.add("player");
    } else {
        log("Attack failed on " + selected.toUpperCase());
        attacker.infantry -= Math.floor(Math.random()*10);
        if (attacker.infantry < 0) attacker.infantry = 0;
    }

    aiTurn();
    selectCountry(selected);
}

function retreat() {
    if (!selected) return;
    let c = countries[selected];
    if (c.owner === "player" && selected !== "usa") {
        countries["usa"].infantry += c.infantry;
        countries["usa"].tanks += c.tanks;
        c.infantry = 0;
        c.tanks = 0;
        log("Troops retreated to USA");
        selectCountry(selected);
    }
}

function aiTurn() {
    let targets = Object.keys(countries).filter(id => countries[id].owner === "player" && id !== "usa");
    if (targets.length === 0) return;

    let target = targets[Math.floor(Math.random()*targets.length)];
    let aiCountries = Object.keys(countries).filter(id => countries[id].owner === "ai");
    if (aiCountries.length === 0) return;

    let attackerId = aiCountries[Math.floor(Math.random()*aiCountries.length)];
    let attacker = countries[attackerId];
    let defender = countries[target];

    let attackPower = attacker.infantry + (attacker.tanks * 3) + Math.random()*15;
    let defendPower = defender.infantry + (defender.tanks * 3) + Math.random()*15;

    if (attackPower > defendPower) {
        log(attackerId.toUpperCase() + " captured " + target.toUpperCase());
        defender.owner = "ai";
        document.getElementById(target).classList.remove("player");
        document.getElementById(target).classList.add("ai");
    } else {
        log(attackerId.toUpperCase() + " failed attacking " + target.toUpperCase());
    }
}

document.querySelectorAll(".country").forEach(el => {
    el.addEventListener("click", () => selectCountry(el.id));
});

document.getElementById("mapContainer").addEventListener("wheel", e => {
    e.preventDefault();
    zoom += e.deltaY * -0.001;
    zoom = Math.min(Math.max(.5, zoom), 3);
    document.getElementById("map").style.transform = `scale(${zoom})`;
});

updateUI();
</script>

</body>
</html>
