<!DOCTYPE html>
<html>
<head>
<title>Iron Crown</title>
<style>
body {
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
}
#log {
    width:250px;
    height:100%;
    overflow-y:auto;
    background:#111;
    padding:10px;
    box-sizing:border-box;
    flex-shrink:0;
}
#main {
    flex-grow:1;
    display:flex;
    flex-direction:column;
}
#map {
    flex-grow:1;
    position:relative;
    background:#2e3b2e;
    margin:5px;
    overflow:hidden;
}
button {
    padding:10px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}
.kingdom {
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:12px;
    text-align:center;
    padding:5px;
    border:2px solid black;
}
.player { background:gold; color:black; }
.enemy { background:crimson; }
</style>
</head>
<body>

<div id="log">
    <h2>👑 Iron Crown</h2>
    <h3>Battle Log</h3>
</div>

<div id="main">
    <div>
        <button onclick="endTurn()">End Turn</button>
        <button onclick="resetGame()">Reset Game</button>
    </div>
    <div id="map"></div>
</div>

<script>
let selectedKingdoms = [];
let turn = 1;

const map = document.getElementById("map");
const log = document.getElementById("log");
let kingdoms = [];

function generateMap() {
    kingdoms = [];
    for(let i=0;i<12;i++){
        kingdoms.push({
            id:i,
            x:Math.random()*80, // smaller to fit map
            y:Math.random()*80,
            troops:30+Math.floor(Math.random()*20),
            owner:i===0?"player":"enemy"
        });
    }
}

function drawMap(){
    map.innerHTML="";
    kingdoms.forEach(k=>{
        const div = document.createElement("div");
        div.className = "kingdom " + k.owner;
        div.style.left = k.x + "%";
        div.style.top = k.y + "%";
        div.innerHTML = "🏰<br>" + k.troops;

        if(selectedKingdoms.includes(k)){
            div.style.boxShadow = "0 0 12px 3px yellow";
        }

        div.onclick = () => selectKingdom(k);
        map.appendChild(div);
    });
}

function selectKingdom(k){
    if(k.owner==="player"){
        if(selectedKingdoms.includes(k)){
            selectedKingdoms = selectedKingdoms.filter(kk => kk !== k);
            addLog("Deselected kingdom with " + k.troops + " troops.");
        } else {
            selectedKingdoms.push(k);
            addLog("Selected kingdom with " + k.troops + " troops.");
        }
        drawMap();
    }
    else if(k.owner==="enemy" && selectedKingdoms.length > 0){
        attackMultiple(selectedKingdoms, k);
    }
}

function attackMultiple(attackers, defender){
    let totalAttackPower = 0;
    attackers.forEach(attacker => {
        let attackRoll = (Math.random()*0.4 + 0.8);
        totalAttackPower += attacker.troops * attackRoll;
    });

    let defendRoll = (Math.random()*0.4 + 0.8);
    if(defender.troops < totalAttackPower){
        defendRoll += 0.1;
    }
    let defendPower = defender.troops * defendRoll;

    addLog("⚔ Battle! Total Attack: "+totalAttackPower.toFixed(1)+" Enemy: "+defendPower.toFixed(1));

    if(totalAttackPower > defendPower){
        addLog("✅ You conquered the kingdom!");
        attackers.forEach(attacker => {
            attacker.troops = Math.floor(attacker.troops * 0.6);
        });
        defender.owner = "player";
        defender.troops = Math.floor(totalAttackPower * 0.5);
    } else {
        addLog("❌ You lost the battle!");
        attackers.forEach(attacker => {
            attacker.troops = Math.floor(attacker.troops * 0.5);
        });
    }

    selectedKingdoms = [];
    drawMap();
    checkWin();
}

function endTurn(){
    turn++;
    addLog("— Turn "+turn+" —");

    kingdoms.forEach(k=>{ k.troops += 5; });

    kingdoms.filter(k=>k.owner==="enemy").forEach(enemy=>{
        let targets=kingdoms.filter(k=>k.owner==="player");
        if(targets.length===0) return;

        if(Math.random()<0.35){
            let target=targets[Math.floor(Math.random()*targets.length)];
            let attackPower=enemy.troops*(Math.random()*0.4+0.8);
            let defendPower=target.troops*(Math.random()*0.4+0.8);

            if(attackPower>defendPower){
                enemy.troops=Math.floor(enemy.troops*0.6);
                target.owner="enemy";
                target.troops=Math.floor(enemy.troops*0.8);
                addLog("💀 Enemy conquered one of your kingdoms!");
            } else {
                enemy.troops=Math.floor(enemy.troops*0.5);
            }
        }
    });

    checkWin();
    drawMap();
}

function checkWin(){
    let playerCount=kingdoms.filter(k=>k.owner==="player").length;
    let enemyCount=kingdoms.filter(k=>k.owner==="enemy").length;

    if(enemyCount===0){
        alert("🏆 You conquered the world!");
    }
    if(playerCount===0){
        alert("💀 Your kingdom has fallen!");
    }
}

function resetGame(){
    turn=1;
    selectedKingdoms=[];
    log.innerHTML="<h2>👑 Iron Crown</h2><h3>Battle Log</h3>";
    generateMap();
    drawMap();
    addLog("Game Reset. New world generated!");
}

function addLog(text){
    log.innerHTML += text+"<br>";
    log.scrollTop=log.scrollHeight;
}

generateMap();
drawMap();
</script>

</body>
</html>
