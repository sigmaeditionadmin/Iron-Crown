<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World of Warfare – Global Conflict</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
overflow:hidden;
}

#map{
flex:1;
}

#panel{
width:320px;
background:#111;
color:white;
display:flex;
flex-direction:column;
}

#tabs{
display:flex;
background:#222;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
border-right:1px solid #333;
}

.tab.active{
background:#444;
}

#panelContent{
flex:1;
overflow-y:auto;
padding:10px;
}

.section{
margin-bottom:20px;
}

select,input{
width:100%;
margin-top:5px;
}

button{
margin-top:6px;
width:100%;
}

#log{
background:#000;
padding:5px;
height:150px;
overflow-y:auto;
font-size:12px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="panel">

<div id="tabs">
<div class="tab active" onclick="openTab('units',event)">Units</div>
<div class="tab" onclick="openTab('missiles',event)">Missiles</div>
<div class="tab" onclick="openTab('nukes',event)">Nukes</div>
</div>

<div id="panelContent">

<div class="section">

<h3>Origin</h3>
<select id="originSelect"></select>

<h3>Target</h3>
<select id="targetSelect"></select>

</div>

<div id="unitsTab">

<h3>Troops</h3>
<input id="troopAmount" type="number" value="10">
<button onclick="sendUnits('troops')">Send Troops</button>

<h3>Planes ✈️</h3>
<input id="planeAmount" type="number" value="5">
<button onclick="sendUnits('planes')">Send Planes</button>

<h3>Ships 🚢</h3>
<input id="shipAmount" type="number" value="5">
<button onclick="sendUnits('ships')">Send Ships</button>

</div>

<div id="missilesTab" style="display:none">

<h3>Missile Strike 🚀</h3>
<button onclick="launchMissile()">Launch Missile</button>

</div>

<div id="nukesTab" style="display:none">

<h3>Nuclear Strike ☢️</h3>
<button onclick="launchNuke()">Launch Nuke</button>

</div>

<h3>Battle Log</h3>
<div id="log"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:6
}).addTo(map);

let log=document.getElementById("log");

function addLog(text){
log.innerHTML+="<div>"+text+"</div>";
log.scrollTop=log.scrollHeight;
}

const countries={

USA:[38,-97],
Brazil:[-10,-55],
UK:[54,-2],
India:[21,78],
Japan:[36,138],
Australia:[-25,133]

};

const originSelect=document.getElementById("originSelect");
const targetSelect=document.getElementById("targetSelect");

for(let c in countries){

let o=document.createElement("option");
o.value=c;
o.text=c;
originSelect.appendChild(o);

let t=document.createElement("option");
t.value=c;
t.text=c;
targetSelect.appendChild(t);

}

function openTab(name,event){

document.getElementById("unitsTab").style.display="none";
document.getElementById("missilesTab").style.display="none";
document.getElementById("nukesTab").style.display="none";

document.getElementById(name+"Tab").style.display="block";

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

}

function sendUnits(type){

let origin=countries[originSelect.value];
let target=countries[targetSelect.value];

let amount=0;

if(type==="troops") amount=document.getElementById("troopAmount").value;
if(type==="planes") amount=document.getElementById("planeAmount").value;
if(type==="ships") amount=document.getElementById("shipAmount").value;

animateAttack(type,amount,origin,target);

}

function animateAttack(type,amount,origin,target){

let icon="⚔️";

if(type==="planes") icon="✈️";
if(type==="ships") icon="🚢";

let marker=L.marker(origin,{
icon:L.divIcon({
html:icon,
className:"",
iconSize:[20,20]
})
}).addTo(map);

let steps=80;
let i=0;

let latStep=(target[0]-origin[0])/steps;
let lngStep=(target[1]-origin[1])/steps;

let move=setInterval(()=>{

i++;

let lat=origin[0]+latStep*i;
let lng=origin[1]+lngStep*i;

marker.setLatLng([lat,lng]);

if(i>=steps){

clearInterval(move);

marker.remove();

addLog(type+" attacked "+targetSelect.value+" with "+amount);

}

},40);

}

function launchMissile(){

let target=countries[targetSelect.value];

L.marker(target,{
icon:L.divIcon({
html:"🚀",
className:"",
iconSize:[20,20]
})
}).addTo(map);

addLog("Missile launched at "+targetSelect.value);

}

function launchNuke(){

let target=countries[targetSelect.value];

L.circle(target,{
radius:600000,
color:"red"
}).addTo(map);

addLog("NUKE DETONATED on "+targetSelect.value+" ☢️");

}

</script>

</body>
</html>
