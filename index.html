<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern Warfare – Global Conflict</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1b1f24;
    color: white;
}

#gameContainer {
    display: flex;
    height: 100vh;
}

#map {
    flex: 3;
}

#sidePanel {
    flex: 1;
    background: #111;
    padding: 15px;
    border-left: 2px solid #333;
    overflow-y: auto;
}

select, input {
    width: 100%;
    margin-bottom: 8px;
    padding: 5px;
    background: #222;
    color: white;
    border: 1px solid #444;
}

button {
    width: 100%;
    padding: 8px;
    background: #2c3e50;
    border: none;
    color: white;
    cursor: pointer;
    margin-bottom: 10px;
}

button:hover {
    background: #34495e;
}

#log {
    background: black;
    padding: 8px;
    height: 200px;
    overflow-y: auto;
    font-size: 12px;
    margin-bottom: 10px;
}

#statsPanel {
    background: #0c0c0c;
    padding: 10px;
    font-size: 13px;
    border: 1px solid #333;
}
</style>
</head>
<body>

<div id="gameContainer">

<div id="map"></div>

<div id="sidePanel">
    <h2>Attack Control Panel</h2>

    <label>Attacking Country</label>
    <select id="attackerSelect"></select>

    <label>Target Country</label>
    <select id="targetSelect"></select>

    <label>Infantry to Send</label>
    <input type="number" id="infantrySend" value="10">

    <label>Tanks to Send</label>
    <input type="number" id="tankSend" value="2">

    <button onclick="launchAttack()">Launch Attack</button>

    <h3>Battle Log</h3>
    <div id="log"></div>

    <h3>📊 Global Stats</h3>
    <div id="statsPanel"></div>
</div>

</div>

<script>
let map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let countries = {
    "United States of America": { owner: "player", infantry: 60, tanks: 12 },
    "Russia": { owner: "ai", infantry: 45, tanks: 8 },
    "China": { owner: "ai", infantry: 50, tanks: 7 },
    "Iran": { owner: "ai", infantry: 30, tanks: 4 },
    "North Korea": { owner: "ai", infantry: 25, tanks: 3 }
};

let geoLayer;

function getColor(owner) {
    return owner === "player" ? "green" : "red";
}

function log(msg) {
    let box = document.getElementById("log");
    box.innerHTML += msg + "<br>";
    box.scrollTop = box.scrollHeight;
}

function style(feature) {
    let name = feature.properties.name;
    if (countries[name]) {
        return {
            fillColor: getColor(countries[name].owner),
            weight: 1,
            color: "black",
            fillOpacity: 0.6
        };
    }
    return { fillOpacity: 0 };
}

function refreshMap() {
    geoLayer.setStyle(style);
}

fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json")
.then(res => res.json())
.then(data => {
    geoLayer = L.geoJSON(data, { style: style }).addTo(map);
});

function populateDropdowns() {
    let attackerSel = document.getElementById("attackerSelect");
    let targetSel = document.getElementById("targetSelect");

    attackerSel.innerHTML = "";
    targetSel.innerHTML = "";

    for (let name in countries) {
        if (countries[name].owner === "player") {
            attackerSel.innerHTML += `<option value="${name}">${name}</option>`;
        } else {
            targetSel.innerHTML += `<option value="${name}">${name}</option>`;
        }
    }
}

function updateStats() {
    let yourCountries = 0;
    let yourInfantry = 0;
    let yourTanks = 0;
    let aiCountries = 0;

    for (let name in countries) {
        if (countries[name].owner === "player") {
            yourCountries++;
            yourInfantry += countries[name].infantry;
            yourTanks += countries[name].tanks;
        } else {
            aiCountries++;
        }
    }

    let totalPower = yourInfantry + yourTanks * 3;

    document.getElementById("statsPanel").innerHTML = `
        <b>Your Countries:</b> ${yourCountries}<br>
        <b>Your Infantry:</b> ${yourInfantry}<br>
        <b>Your Tanks:</b> ${yourTanks}<br>
        <b>Total Power:</b> ${totalPower}<br>
        <b>AI Countries Left:</b> ${aiCountries}
    `;
}

function launchAttack() {
    let attackerName = document.getElementById("attackerSelect").value;
    let targetName = document.getElementById("targetSelect").value;
    let inf = parseInt(document.getElementById("infantrySend").value);
    let tanks = parseInt(document.getElementById("tankSend").value);

    let attacker = countries[attackerName];
    let defender = countries[targetName];

    if (inf > attacker.infantry || tanks > attacker.tanks) {
        log("Not enough troops!");
        return;
    }

    attacker.infantry -= inf;
    attacker.tanks -= tanks;

    let attackPower = inf + tanks*3 + Math.random()*20;
    let defendPower = defender.infantry + defender.tanks*3 + Math.random()*20;

    if (attackPower > defendPower) {
        log(attackerName + " captured " + targetName);
        defender.owner = "player";
        defender.infantry = Math.floor(inf/2);
        defender.tanks = Math.floor(tanks/2);
    } else {
        log(attackerName + " failed attacking " + targetName);
        defender.infantry -= Math.floor(inf/3);
        if (defender.infantry < 0) defender.infantry = 0;
    }

    populateDropdowns();
    refreshMap();
    updateStats();
}

populateDropdowns();
updateStats();
</script>

</body>
</html>
