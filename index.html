<!DOCTYPE html>
<html>
<head>
<title>Iron Crown</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  margin:0;
}

#container{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

#map{
  position:relative;
  width:750px;
  height:500px;
  background:#1a1a1a;
  border:3px solid #666;
  border-radius:8px;
  overflow:hidden;
}

#log{
  width:300px;
  height:500px;
  background:#222;
  margin-left:15px;
  border-radius:8px;
  padding:8px;
  overflow-y:auto;
  font-size:14px;
}

.kingdom{
  position:absolute;
  width:65px;
  height:65px;
  border-radius:50%;
  text-align:center;
  padding-top:10px;
  font-size:13px;
  cursor:pointer;
  z-index:2;
  transition:0.2s;
}

.kingdom:hover{
  transform:scale(1.05);
}

.player{ background:#1f8f1f; }
.enemy{ background:#b22222; }
.ally{ background:#2e6cff; }

.arrow-layer{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

.attack-arrow{
  stroke:red;
  stroke-width:3;
  fill:none;
  marker-end:url(#arrowhead);
  animation:fadeArrow 1s forwards;
}

@keyframes fadeArrow{
  from{opacity:1;}
  to{opacity:0;}
}

.action-btns{
  position:absolute;
  top:-38px;
  left:-25px;
  z-index:5;
}

button{
  margin:2px;
  padding:3px 6px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1 style="text-align:center;">👑 Iron Crown</h1>

<div id="container">
  <div id="map">
    <svg class="arrow-layer" id="arrowLayer">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7"
          refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="red"/>
        </marker>
      </defs>
    </svg>
  </div>

  <div id="log"></div>
</div>

<script>
const map=document.getElementById("map");
const log=document.getElementById("log");

let kingdoms=[];
let selected=[];
const MAX_ALLIES=2;

function logMsg(t){
  log.innerHTML+=t+"<br>";
  log.scrollTop=log.scrollHeight;
}

function randomPos(){
  let x,y,valid=false;
  while(!valid){
    x=Math.random()*85+5;
    y=Math.random()*85+5;
    valid=true;
    for(let k of kingdoms){
      if(Math.hypot(k.x-x,k.y-y)<12) valid=false;
    }
  }
  return {x,y};
}

function create(owner,troops){
  const p=randomPos();
  kingdoms.push({owner,troops,x:p.x,y:p.y});
}

function init(){
  kingdoms=[];
  selected=[];
  create("player",50);   // ALWAYS GREEN
  for(let i=0;i<6;i++){
    create("enemy",30+Math.floor(Math.random()*20));
  }
  draw();
}

function draw(){
  map.querySelectorAll(".kingdom").forEach(e=>e.remove());

  kingdoms.forEach(k=>{
    const d=document.createElement("div");
    d.className="kingdom "+k.owner;
    d.style.left=k.x+"%";
    d.style.top=k.y+"%";
    d.innerHTML="🏰<br>"+k.troops;
    d.onclick=()=>clickKingdom(k,d);
    map.appendChild(d);
  });

  highlight();
}

function highlight(){
  document.querySelectorAll(".kingdom").forEach(d=>d.style.boxShadow="none");
  selected.forEach(k=>{
    const match=[...document.querySelectorAll(".kingdom")]
      .find(d=>parseFloat(d.style.left)==k.x && parseFloat(d.style.top)==k.y);
    if(match) match.style.boxShadow="0 0 18px yellow";
  });
}

function clickKingdom(k,div){

  if(k.owner==="player"||k.owner==="ally"){
    if(selected.includes(k)){
      selected=selected.filter(x=>x!==k);
      logMsg("Deselected kingdom with "+k.troops+" troops.");
    }else{
      selected=[k];
      logMsg("Selected kingdom with "+k.troops+" troops.");
    }
    draw();
    return;
  }

  if(selected.length===0) return;

  const box=document.createElement("div");
  box.className="action-btns";

  const atk=document.createElement("button");
  atk.innerText="Attack";
  atk.onclick=(e)=>{e.stopPropagation();playerAttack(k);};
  box.appendChild(atk);

  const spy=document.createElement("button");
  spy.innerText="Spy";
  spy.onclick=(e)=>{e.stopPropagation();spyOn(k);};
  box.appendChild(spy);

  if(kingdoms.filter(x=>x.owner==="ally").length<MAX_ALLIES){
    const ally=document.createElement("button");
    ally.innerText="Alliance";
    ally.onclick=(e)=>{e.stopPropagation();allyWith(k);};
    box.appendChild(ally);
  }

  div.appendChild(box);
}

function arrow(a,b){
  const svg=document.getElementById("arrowLayer");
  const r=map.getBoundingClientRect();

  const line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",a.x/100*r.width);
  line.setAttribute("y1",a.y/100*r.height);
  line.setAttribute("x2",b.x/100*r.width);
  line.setAttribute("y2",b.y/100*r.height);
  line.setAttribute("class","attack-arrow");
  svg.appendChild(line);
  setTimeout(()=>line.remove(),1000);
}

function playerAttack(target){
  const attacker=selected[0];
  if(!attacker || attacker.troops<=1) return;

  arrow(attacker,target);

  const atk=Math.floor(attacker.troops*(0.4+Math.random()*0.4));
  const def=Math.floor(target.troops*(0.3+Math.random()*0.4));

  if(atk>def){
    logMsg("⚔ You conquered a kingdom!");
    target.owner="player";
    target.troops=Math.floor(attacker.troops/2);
  }else{
    logMsg("🛡 Attack failed.");
  }

  attacker.troops=Math.max(1,Math.floor(attacker.troops/2));

  selected=[];
  clean();
  draw();

  setTimeout(aiTurn,1000);
}

function aiTurn(){

  const aiList=kingdoms.filter(k=>k.owner==="enemy");
  if(aiList.length===0) return;

  const ai=aiList[Math.floor(Math.random()*aiList.length)];
  if(ai.troops<=1) return;

  const targets=kingdoms.filter(k=>k!==ai);
  if(targets.length===0) return;

  const t=targets[Math.floor(Math.random()*targets.length)];

  arrow(ai,t);

  const atk=Math.floor(ai.troops*(0.4+Math.random()*0.4));
  const def=Math.floor(t.troops*(0.3+Math.random()*0.4));

  if(atk>def){
    t.owner="enemy";
    t.troops=Math.floor(ai.troops/2);
    logMsg("⚔ AI conquered a kingdom!");
  }else{
    logMsg("🛡 AI attack failed.");
  }

  ai.troops=Math.max(1,Math.floor(ai.troops/2));

  clean();
  draw();
}

function allyWith(t){
  if(Math.random()<0.5){
    t.owner="ally";
    logMsg("🤝 Alliance formed!");
  }else{
    logMsg("Alliance rejected.");
  }
  draw();
}

function spyOn(t){
  logMsg("🕵 Spy sent...");
  setTimeout(()=>logMsg("Spy report: "+t.troops+" troops."),500);
}

function clean(){
  kingdoms=kingdoms.filter(k=>k.troops>0);
}

init();
</script>

</body>
</html>
